<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes réservations — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/vendor/fontawesome-free-6.5.1-web/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1>Mes réservations</h1>
    <p class="muted">Pour protéger les informations de chaque visiteur, entrez votre numéro de réservation (ex : MB-ABC123) ou votre adresse email pour retrouver vos réservations.</p>
    <div class="card" style="max-width:520px;">
      <form id="lookup-form">
        <div class="form-group">
          <label for="lookup-query">Numéro de réservation ou email</label>
          <input type="text" id="lookup-query" placeholder="MB-ABC123 ou vous@exemple.com" required>
        </div>
        <button type="submit" class="btn btn-primary" id="lookup-btn">Rechercher</button>
      </form>
    </div>
    <div id="res-list" class="mt-3"></div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
  MB.initCommon();

  // Chaque visiteur doit prouver qu'il connaît le numéro ou l'email de sa
  // propre réservation avant de la voir (protection des informations de
  // chaque visiteur, y compris sur un ordinateur partagé).
  const STATUS_LABELS = { en_attente: 'En attente de validation', confirmee: 'Confirmée', rejetee: 'Rejetée', annulee: 'Annulée' };
  const STATUS_BADGE = { en_attente: 'badge-pending', confirmee: 'badge-confirmed', rejetee: 'badge-cancelled', annulee: 'badge-cancelled' };
  let currentReservations = [];
  let allTripsCache = null;

  function downloadTicket(r) {
    const text = `MADA-BROUSSE — Billet de voyage\n`
      + `Réservation : ${r.id}\nClient : ${r.customer_name}\nTrajet : ${r.trip_id}\n`
      + `Sièges : ${MB.seatLabels(r.selected_seats)}\nTotal : ${MB.formatAr(r.total)}\nStatut : ${STATUS_LABELS[r.status] || r.status}\n`;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `billet-${r.id}.txt`;
    a.click();
  }

  function render(reservations) {
    currentReservations = reservations;
    const wrap = document.getElementById('res-list');
    if (!reservations.length) {
      wrap.innerHTML = '<div class="empty-state">Aucune réservation trouvée pour ce numéro/email.</div>';
      return;
    }
    wrap.innerHTML = reservations.map(r => {
      const validated = r.status === 'confirmee';
      const canModify = r.status === 'en_attente' || r.status === 'confirmee';
      return `
      <div class="card mt-2" data-id="${r.id}">
        <div class="flex-between">
          <div>
            <strong>${r.id}</strong>
            <span class="badge ${STATUS_BADGE[r.status] || ''}">${STATUS_LABELS[r.status] || r.status}</span>
            <p>${r.customer_name} — Trajet ${r.trip_id} — Sièges ${MB.seatLabels(r.selected_seats)}</p>
            <p class="muted">Total : ${MB.formatAr(r.total)}</p>
            ${!validated ? `<p class="help-text">🔒 Le téléchargement et l'impression seront disponibles dès que l'administrateur aura validé votre réservation.</p>` : ''}
          </div>
        </div>
        <div class="reschedule-box" style="display:none; margin-top:10px;">
          <label>Choisir un nouveau trajet</label>
          <select class="reschedule-select"></select>
          <button class="btn btn-primary btn-sm confirm-reschedule mt-1">Valider le changement</button>
          <p class="help-text">Le changement de trajet remettra votre réservation en attente de validation par l'administrateur, même si elle était déjà confirmée.</p>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm print-one" ${validated ? '' : 'disabled title="En attente de validation admin"'}>Imprimer</button>
          <button class="btn btn-secondary btn-sm download-one" ${validated ? '' : 'disabled title="En attente de validation admin"'}>Télécharger</button>
          ${canModify ? `<button class="btn btn-outline-success btn-sm modify-one">Modifier la date/trajet</button>` : ''}
          ${canModify ? `<button class="btn btn-danger btn-sm cancel-one">Annuler</button>` : ''}
        </div>
      </div>
    `; }).join('');

    wrap.querySelectorAll('.cancel-one').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.target.closest('[data-id]').dataset.id;
        if (confirm('Annuler cette réservation ?')) {
          MB.cancelReservation(id).then(() => refresh());
        }
      });
    });
    wrap.querySelectorAll('.print-one').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', () => window.print());
    });
    wrap.querySelectorAll('.download-one').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', e => {
        const id = e.target.closest('[data-id]').dataset.id;
        downloadTicket(currentReservations.find(r => r.id === id));
      });
    });
    wrap.querySelectorAll('.modify-one').forEach(btn => {
      btn.addEventListener('click', async e => {
        const card = e.target.closest('[data-id]');
        const box = card.querySelector('.reschedule-box');
        const select = card.querySelector('.reschedule-select');
        if (box.style.display === 'none') {
          if (!allTripsCache) allTripsCache = await MB.fetchTrips();
          select.innerHTML = allTripsCache.map(t =>
            `<option value="${t.id}">${t.departure} → ${t.destination} — ${t.departure_time} — ${MB.formatAr(t.price)}</option>`
          ).join('');
          box.style.display = '';
        } else {
          box.style.display = 'none';
        }
      });
    });
    wrap.querySelectorAll('.confirm-reschedule').forEach(btn => {
      btn.addEventListener('click', e => {
        const card = e.target.closest('[data-id]');
        const id = card.dataset.id;
        const newTripId = card.querySelector('.reschedule-select').value;
        if (!confirm('Confirmer le changement de trajet ? Votre réservation devra être re-validée par l\'administrateur.')) return;
        MB.rescheduleReservation(id, newTripId).then(() => refresh()).catch(err => alert(err.message));
      });
    });
  }

  function refresh() {
    const query = document.getElementById('lookup-query').value.trim();
    if (!query) return;
    MB.lookupReservations(query).then(render).catch(err => {
      document.getElementById('res-list').innerHTML = `<div class="empty-state">${err.message}</div>`;
    });
  }

  document.getElementById('lookup-form').addEventListener('submit', e => {
    e.preventDefault();
    refresh();
  });

  // Pratique juste après une réservation : pré-remplit avec le dernier
  // numéro reçu (mais ne lance PAS la recherche automatiquement — le
  // visiteur doit cliquer "Rechercher" lui-même).
  const lastId = localStorage.getItem('mb_last_reservation');
  if (lastId) document.getElementById('lookup-query').value = lastId;

  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
