<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/vendor/fontawesome-free-6.5.1-web/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container text-center" style="max-width:500px;">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="var(--vert-fonce)" stroke-width="1.6" style="margin:0 auto;"><circle cx="12" cy="12" r="10" fill="rgba(74,124,46,.12)"/><path d="M7.5 12.5 10.5 15.5 16.5 8.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h2 class="mt-3">Réservation confirmée !</h2>
    <div class="card p-4 mt-4">
      <h5>N° <span id="reservation-id"></span></h5>
      <p id="status-msg" class="mt-2"></p>
      <div id="qrcode" class="my-3" style="display:none;">
        <canvas id="qrCanvas" width="150" height="150"></canvas>
      </div>
      <p class="small text-muted" id="qr-hint" style="display:none;">Scannez à l'embarquement</p>
      <button class="btn btn-success m-1" id="print-btn" disabled title="En attente de validation admin">Imprimer</button>
      <button class="btn btn-success m-1" id="download-btn" disabled title="En attente de validation admin">Télécharger</button>
      <a href="/mes-reservations" class="btn btn-outline-success m-1">Mes réservations</a>
    </div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
  MB.initCommon();
  const resId = localStorage.getItem('mb_last_reservation');
  const STATUS_TEXT = {
    en_attente: '⏳ Votre réservation est en attente de validation par l\'administrateur. Le billet (impression / téléchargement) sera disponible dès validation.',
    confirmee: '✅ Réservation validée par l\'administrateur — votre billet est prêt.',
    rejetee: '❌ Cette réservation a été rejetée par l\'administrateur. Contactez-nous pour plus d\'informations.',
    annulee: 'Cette réservation a été annulée.'
  };

  function downloadTicket(r) {
    const text = `MADA-BROUSSE — Billet de voyage\n`
      + `Réservation : ${r.id}\nClient : ${r.customer_name}\nTrajet : ${r.trip_id}\n`
      + `Sièges : ${MB.seatLabels(r.selected_seats)}\nTotal : ${MB.formatAr(r.total)}\n`;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `billet-${r.id}.txt`;
    a.click();
  }

  if (resId) {
    document.getElementById('reservation-id').textContent = resId;
    MB.lookupReservations(resId).then(list => {
      const r = list.find(x => x.id === resId);
      if (!r) return;
      document.getElementById('status-msg').textContent = STATUS_TEXT[r.status] || '';
      if (r.status === 'confirmee') {
        const canvas = document.getElementById('qrCanvas');
        document.getElementById('qrcode').style.display = '';
        document.getElementById('qr-hint').style.display = '';
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#000';
          for (let i = 0; i < 10; i++) for (let j = 0; j < 10; j++) if (Math.random() > 0.5) ctx.fillRect(i*15, j*15, 12, 12);
          ctx.fillStyle = '#fff';
          ctx.fillRect(45, 45, 60, 60);
        }
        const printBtn = document.getElementById('print-btn');
        const downloadBtn = document.getElementById('download-btn');
        printBtn.disabled = false; printBtn.title = '';
        downloadBtn.disabled = false; downloadBtn.title = '';
        printBtn.addEventListener('click', () => window.print());
        downloadBtn.addEventListener('click', () => downloadTicket(r));
      }
    }).catch(() => {});
  }
  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
